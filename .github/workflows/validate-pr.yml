name: Validate SKILL.md on PR
on:
  pull_request:
    paths:
      - 'skills/**/*.md'
      - 'SKILL.md.template'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run Validator
        run: |
          for f in $(find skills -name 'SKILL.md'); do
            echo "Validating $f"
            node tooling/validate-skill.js "$f"
          done
      - name: Token Count Check
        run: |
          pip install requests
          for f in $(find skills -name 'SKILL.md'); do
            python tooling/count-tokens.py "$f"
          done